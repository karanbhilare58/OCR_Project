<!DOCTYPE html>
<html>
<head>

<title>OCR Result</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body style="background:#f5f7fb">

<div class="container mt-5">

<h2 class="text-center mb-4">📊 Extracted Receipt Data</h2>

<div class="card shadow p-4">

<table class="table">

<tr>
<th>Date</th>
<td>{{ data.date }}</td>
</tr>

<tr>
<th>Subtotal</th>
<td>{{ data.subtotal }}</td>
</tr>

<tr>
<th>Tax</th>
<td>{{ data.tax }}</td>
</tr>

<tr>
<th>Total</th>
<td><b>{{ data.total }}</b></td>
</tr>
<tr>
<th>OCR Confidence</th>
<td>

<div class="progress">

<div class="progress-bar bg-success"
style="width: {{ data.confidence }}%">

{{ data.confidence }}%

</div>

</div>

</td>
</tr>

</table>

</div>

<div class="text-center mt-4">

<a href="/" class="btn btn-secondary">Upload Another Receipt</a>

</div>

</div>

</body>
</html>
