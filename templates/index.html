<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Receipt OCR Extractor</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:#f5f7fb;
}

.upload-box{
border:2px dashed #6c757d;
padding:40px;
border-radius:12px;
text-align:center;
background:white;
}

.preview-img{
max-width:100%;
margin-top:20px;
}
</style>

</head>

<body>

<div class="container mt-5">

<h2 class="text-center mb-4">📄 AI Receipt OCR Extractor</h2>

<div class="text-center mb-4">

<h5>Detected Text Regions</h5>

<img src="{{ image }}" class="img-fluid border rounded">

</div>

<div class="row justify-content-center">
<div class="col-md-6">

<div class="upload-box">

<form action="/upload" method="post" enctype="multipart/form-data">

<input class="form-control" type="file" name="image" id="imageInput" required>

<img id="preview" class="preview-img"/>

<br><br>

<button class="btn btn-primary w-100">Extract Data</button>

</form>

</div>

</div>
</div>

</div>

<script>

document.getElementById("imageInput").onchange = evt => {

const [file] = imageInput.files

if(file){

document.getElementById("preview").src = URL.createObjectURL(file)

}

}

</script>

</body>
</html>
